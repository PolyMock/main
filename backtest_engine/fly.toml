# fly.toml app configuration file generated for backtest-engine-api on 2026-03-21T18:14:37+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backtest-engine-api'
primary_region = 'sjc'

[build]
  dockerfile = './Dockerfile'

[env]
  DATA_PATH = '/data/prediction-market-data/data'

[[mounts]]
  source = 'backtest_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '8gb'
  cpu_kind = 'performance'
  cpus = 2
  memory_mb = 8192
