<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/1.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>PolyMock - Polymarket Paper Trading</title>
		<meta name="description" content="Paper trading platform for Polymarket prediction markets with live data feeds" />
		<style>
			*:not(.xterm *):not(.xterm) {
				font-family: Arial, Helvetica, sans-serif !important;
			}
			body {
				font-family: Arial, Helvetica, sans-serif !important;
				margin: 0;
				padding: 0;
				background: #000;
				color: #4785ff;
			}
		</style>
		<script>
			if(typeof globalThis.global==='undefined'){globalThis.global=globalThis;}
			if(typeof window.global==='undefined'){window.global=window;}
			if(typeof globalThis.process==='undefined'){globalThis.process={env:{},version:'',versions:{},platform:'browser',browser:true};}
			if(!globalThis.process.nextTick){globalThis.process.nextTick=function(fn){var args=Array.prototype.slice.call(arguments,1);Promise.resolve().then(function(){fn.apply(null,args);});};}
			if(typeof window.process==='undefined'){window.process=globalThis.process;}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
